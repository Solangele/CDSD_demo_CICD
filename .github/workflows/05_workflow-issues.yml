name: Workflow qui se déclenche lors de la création d'une issue
on: 
  issues:
    types: opened

jobs:
  commentaire: 
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - run: gh issue comment ${{ github.event.issue.html_url }} --body "Merci d'avoir ouvert cette issue !"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}